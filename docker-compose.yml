services:
  postgres:
    image: postgres:17
    container_name: flash-sale-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flash_sale
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: flash-sale-backend
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_NAME: flash_sale
      PORT: 3000
    ports:
      - '3000:3000'

  frontend:
    build:
      context: ./frontend
    container_name: flash-sale-frontend
    depends_on:
      - backend
    ports:
      - '3001:3001'

volumes:
  postgres_data: